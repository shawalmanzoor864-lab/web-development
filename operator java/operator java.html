<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billing system</title>
    <link rel="stylesheet" href="oj .css" />
  </head>
  <body>
    <div class="container">
      <div class="title-box">
        <div class="title">
          <label style="font-size: larger; font-weight: 500"
            >Billing System</label
          ><br /><br />

          <form id="billing-form" onsubmit="calculateBill(event)">
            <label style="color: Black" for="name">Name</label>
            <input type="text" id="name" /><br /><br />
            <label style="color: Black" for="amount">Amount</label>
            <input type="Number" id="amount" /><br /><br />
            <button type="submit">Calculate Bill</button>
          </form>
          <div class="output"></div>
        </div>
      </div>
    </div>

    <script>
      function calculateBill(e){
         e.preventDefault();


      
       
        let name = document.getElementById("name").value;
        let amount = parseFloat(document.getElementById("amount").value);

        let discount = 0;

        if (amount >= 5000) {
          discount = amount * 0.2;
        } else if (amount >= 3000) {
          discount = amount * 0.1;
        } else if (amount >= 1000) {
          discount = amount * 0.05;
        }

        let discountedAmount = amount - discount;
        let tax = amount * 0.05;
        let finalbill = discountedAmount + tax;
        let customerStatus =
          finalbill > 4000 ? "Premium customer" : "New customer";

        document.querySelector(".output").innerHTML = `
            <h3>Receipt</h3>
            <p>Original Amount: ${amount}</p>
            <p>Discount: ${discount}</p>
            <p>Tax: ${tax}</p>
            <p>Final Bill: ${finalbill}</p>
            <p>Status: ${customerStatus}</p>
            `;
      }
    </script>
  </body>
</html>
